  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.disabled = isLoading;
  btn.classList.toggle('refreshing', isLoading);
}
function parseWorkerQuotePayload(j) {
  if (!j) return null;
  const meta = j?.chart?.result?.[0]?.meta || {};
  const closes = j?.chart?.result?.[0]?.indicators?.quote?.[0]?.close || j?.closes || [];
  const nums = (Array.isArray(closes) ? closes : []).filter(v => v != null && !isNaN(v)).map(Number);
  let price = Number(j.price ?? j.regularMarketPrice ?? j.currentPrice ?? j.lastPrice ?? meta.regularMarketPrice ?? 0) || null;
  let prev = Number(j.previousClose ?? j.previous_close ?? j.regularMarketPreviousClose ?? j.prevClose ?? 0) || null;
  const changeAbs = Number(j.change ?? j.regularMarketChange ?? meta.regularMarketChange ?? 0);
  const changePctRaw = Number(j.changePercent ?? j.regularMarketChangePercent ?? meta.regularMarketChangePercent ?? 0);
  const changePct = isNaN(changePctRaw) || changePctRaw === 0 ? null : changePctRaw;
  if (!price && nums.length) price = nums[nums.length - 1];
  if (!prev && nums.length >= 2) prev = nums[nums.length - 2];
  if (!prev && price && !isNaN(changeAbs) && changeAbs !== 0) prev = price - changeAbs;
  if (!prev && price && changePct != null && changePct !== -100) prev = price / (1 + changePct / 100);
  if (!prev) prev = Number(meta.chartPreviousClose || meta.previousClose || 0) || null;
  return price ? { price, prev: prev || null } : null;
}
async function cfFetchQuote(ticker) {
  const bust = Math.floor(Date.now() / 60000);
  const urls = [
    `${CF_WORKER}/?ticker=${encodeURIComponent(ticker)}&_=${bust}`,
    `${CF_WORKER}/?ticker=${encodeURIComponent(ticker)}&range=10d&_=${bust}`,
    `${CF_WORKER}/?ticker=${ticker}&_=${bust}`,
    `${CF_WORKER}/?ticker=${ticker}&range=10d&_=${bust}`
  ];
  for (const url of urls) {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const j = await r.json();
      const parsed = parseWorkerQuotePayload(j);
      if (parsed && parsed.price) return parsed;
    } catch {}
  }
  return null;
}
async function fetchTickerWithFallback(tickers) {
  for (const t of tickers || []) {
    const quote = await cfFetchQuote(t);
    if (quote && quote.price) return { ticker:t, ...quote };
  }
  return null;
}
async function loadFX() {
  const pairs = { USD:'EURUSD=X', CHF:'EURCHF=X', AUD:'EURAUD=X', CAD:'EURCAD=X' };
  await Promise.all(Object.entries(pairs).map(async ([ccy, ticker]) => {
    const quote = await cfFetchQuote(ticker);
    if (quote && quote.price) fxRates[ccy] = quote.price;
  }));
}
function toEUR(priceLocal, ccy) {
  if (ccy === 'EUR') return priceLocal;
  const rate = fxRates[ccy];
  return rate ? priceLocal / rate : priceLocal;
}
async function loadKurse() {
  await Promise.all(portfolio.map(async p => {
    const info = TICKER_MAP[p.wkn];
    if (!info) return;
    const quote = await fetchTickerWithFallback(info.tickers);
    if (!quote || !quote.price) return;
    liveKurse[p.wkn] = toEUR(quote.price, info.fx);
    prevKurse[p.wkn] = toEUR(quote.prev || quote.price, info.fx);
  }));
}

function getSortArrow(key){
  if(currentSort.key !== key) return '⇵';
  return currentSort.dir === 'asc' ? '↑' : '↓';
}
function sortRows(rows){
  const sorted = [...rows];
  const dir = currentSort.dir === 'asc' ? 1 : -1;
  sorted.sort((a,b)=>{
    let av, bv;
    switch(currentSort.key){
      case 'name':
        av = (a.name || '').toLowerCase();
        bv = (b.name || '').toLowerCase();
        if(av < bv) return -1 * dir;
        if(av > bv) return 1 * dir;
        return 0;
      case 'currentValue':
        av = Number(a.currentValue || 0);
        bv = Number(b.currentValue || 0);
        break;
      case 'dayAbs':
        av = Number(a.dayAbs || 0);
        bv = Number(b.dayAbs || 0);
        break;
      case 'diffAbs':
        av = Number(a.diffAbs || 0);
        bv = Number(b.diffAbs || 0);
        break;
      default:
        av = Number(a.currentValue || 0);
        bv = Number(b.currentValue || 0);
    }
    if (av === bv) return 0;
    return (av - bv) * dir;
  });
  const total = sorted.reduce((s,r)=>s+r.currentValue,0);
  let running = 0;
  sorted.forEach(r=>{ r.share = total ? r.currentValue/total : 0; running += r.share; r.cumShare = running; });
  return sorted;
}
function toggleSort(key){
  if(currentSort.key === key){
    currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    currentSort.key = key;
    currentSort.dir = key === 'name' ? 'asc' : 'desc';
  }
  detailMode = false;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function rowsFromPortfolio(){
  const rows = portfolio.map(p=>{
    const shares = p.lots.reduce((s,l)=>s+Number(l.shares||0),0);
    const refValue = p.lots.reduce((s,l)=>s+Number(l.shares||0)*Number(l.price||0),0);
    const refPrice = shares>0 ? refValue/shares : 0;
    const currentPrice = liveKurse[p.wkn] ?? refPrice;
    const prevPrice = prevKurse[p.wkn] ?? currentPrice;
    const currentValue = currentPrice * shares;
    const prevValue = prevPrice * shares;
    const dayAbs = currentValue - prevValue;
    const dayPct = prevValue ? dayAbs / prevValue : 0;
    return {...p, shares, refValue, refPrice, currentPrice, currentValue, prevPrice, prevValue, diffAbs: currentValue-refValue, diffPct: refValue ? (currentValue-refValue)/refValue : 0, dayAbs, dayPct, isLive: liveKurse[p.wkn] != null};
  });
  const total = rows.reduce((s,r)=>s+r.currentValue,0);
  let running = 0;
  rows.forEach(r=>{ r.share = total ? r.currentValue/total : 0; running += r.share; r.cumShare = running; });
  return rows;
}
function renderDate(){ document.getElementById('hdDate').textContent = new Date().toLocaleDateString('de-DE',{weekday:'short', day:'2-digit', month:'short', year:'numeric'}); }
function renderKpis(rows){
  const total = rows.reduce((s,r)=>s+r.currentValue,0);
  const ref = rows.reduce((s,r)=>s+r.refValue,0);
  const diff = total-ref;
  const diffPct = ref?diff/ref:0;
  const dayAbs = rows.reduce((s,r)=>s+r.dayAbs,0);
  const prevTotal = rows.reduce((s,r)=>s+r.prevValue,0);
  const dayPct = prevTotal ? dayAbs/prevTotal : 0;
  const kpis = [
    ['Aktueller Depotwert', `${f(total)} €`, 'nur Wertpapiere – kein Cash', ''],
    ['Wert 31.12.25', `${f(ref)} €`, 'eingefrorene Referenzbasis', ''],
    ['Performance heute', `${fp(dayPct)}`, 'prozentuale Veränderung gegen Vortag', cl(dayPct)],
    ['Veränderung heute', `${fc(dayAbs)}`, 'absolute Veränderung gegen Vortag', cl(dayAbs)],
    ['Performance seit 31.12.2025', `${fp(diffPct)}`, 'prozentuale Veränderung YTD', cl(diffPct)],
    ['Veränderung YTD', `${fc(diff)}`, 'absolute Veränderung YTD', cl(diff)]
  ];
  document.getElementById('kpiGrid').innerHTML = kpis.map(([l,v,s,cls])=>`<div class="kpi"><div class="kpi-l">${l}</div><div class="kpi-v ${cls}">${v}</div><div class="kpi-s">${s}</div></div>`).join('');
}
function renderPositions(rows){
  const wrap = document.getElementById('positionsWrap');
  document.getElementById('detailsBtn').textContent = detailMode ? 'Home' : 'Details';
  wrap.classList.toggle('detail-width', detailMode);
  document.getElementById('structureTitle').classList.toggle('hidden', detailMode);
  document.getElementById('structureGrid').classList.toggle('hidden', detailMode);
  document.getElementById('modeNote').textContent = detailMode
    ? 'Detailansicht wie im Investments-Bereich von Folio.wax – nur Bezeichnung, WKN, Kategorie, Land und Börse'
    : 'Kachel-Entwurf mit weißem Kartenlook, klarerer Kopfzeile, Positionsnummer links und Anteil/Kumuliert rechts – optimiert für bessere Lesbarkeit und iPhone-Darstellung';
  if(detailMode){
    wrap.innerHTML = `<div class="tw"><table id="positionsTable"><thead><tr><th>Bezeichnung</th><th>WKN</th><th>Kategorie</th><th>Land</th><th>Börse</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.name}</td><td class="dim">${r.wkn}</td><td class="dim">${r.meta.category}</td><td class="dim">${r.meta.country}</td><td class="dim">${r.meta.exchange}</td></tr>`).join('')}</tbody></table></div>`;
    return;
  }
  const stamp = lastMarketUpdate ? formatStamp(lastMarketUpdate) : 'Referenzbasis 31.12.25';
  const header = `<div class="positions-header-card"><div class="pos-grid"><div class="pos-col pos-rank"><div class="pos-rank-badge"><strong>#</strong></div></div><div class="pos-col"><div class="pos-head-main"><span class="sort-head"><button class="sort-btn ${currentSort.key==='name' ? 'active' : ''}" type="button" onclick="toggleSort('name')">Wertpapier <span class="sort-arrow">${getSortArrow('name')}</span></button></span></div><div class="pos-head-sub">WKN · Anzahl · Datum / Uhrzeit</div></div><div class="pos-col"><div class="pos-head-main"><span class="sort-head"><button class="sort-btn ${currentSort.key==='currentValue' ? 'active' : ''}" type="button" onclick="toggleSort('currentValue')">Wert aktuell <span class="sort-arrow">${getSortArrow('currentValue')}</span></button></span></div><div class="pos-head-sub">Wert 31.12.25</div></div><div class="pos-col"><div class="pos-head-main">Kurs aktuell</div><div class="pos-head-sub">Kurs 31.12.25</div></div><div class="pos-col"><div class="pos-head-main"><span class="sort-head"><button class="sort-btn ${currentSort.key==='dayAbs' ? 'active' : ''}" type="button" onclick="toggleSort('dayAbs')">Veränd. heute <span class="sort-arrow">${getSortArrow('dayAbs')}</span></button></span></div><div class="pos-head-sub">in € und %</div></div><div class="pos-col"><div class="pos-head-main"><span class="sort-head"><button class="sort-btn ${currentSort.key==='diffAbs' ? 'active' : ''}" type="button" onclick="toggleSort('diffAbs')">Veränd. YTD <span class="sort-arrow">${getSortArrow('diffAbs')}</span></button></span></div><div class="pos-head-sub">in € und %</div></div><div class="pos-col"><div class="pos-head-main">Anteil</div><div class="pos-head-sub">Kumuliert</div></div></div></div>`;
  const sortedRows = sortRows(rows);
  const cards = sortedRows.map((r,idx)=>{
    const tone = idx % 2 === 0 ? 'light' : 'dark';
    return `<article class="position-card ${tone}"><div class="pos-grid"><div class="pos-col pos-rank"><div class="pos-rank-badge"><strong>${idx + 1}</strong></div></div><div class="pos-col neutral"><div class="pos-main-title">${r.name}</div><div class="pos-main-meta"><span>${r.wkn}</span><span>${f(r.shares,0)} Stck.</span><span>${stamp}</span></div></div><div class="pos-col neutral"><div class="pos-value-top">${compactCurrency(r.currentValue)}</div><div class="pos-value-sub">${compactCurrency(r.refValue)}</div></div><div class="pos-col neutral"><div class="pos-value-top">${f(r.currentPrice,2)}</div><div class="pos-value-sub">${f(r.refPrice,2)}</div></div><div class="pos-col ${cl(r.dayAbs)}"><div class="pos-value-top">${fc(r.dayAbs)}</div><div class="pos-value-sub">${fp(r.dayPct)}</div></div><div class="pos-col ${cl(r.diffAbs)}"><div class="pos-value-top">${fc(r.diffAbs)}</div><div class="pos-value-sub">${fp(r.diffPct)}</div></div><div class="pos-col neutral"><div class="pos-share-top">${f(r.share*100,2)}%</div><div class="pos-share-sub">${f(r.cumShare*100,2)}%</div></div></div></article>`;
  }).join('');
  const totalCurrent = sortedRows.reduce((s,r)=>s+r.currentValue,0);
  const totalRef = sortedRows.reduce((s,r)=>s+r.refValue,0);
  const totalDayAbs = sortedRows.reduce((s,r)=>s+r.dayAbs,0);
  const totalDayPct = totalRef ? totalDayAbs / totalRef : 0;
  const totalDiffAbs = sortedRows.reduce((s,r)=>s+r.diffAbs,0);
  const totalDiffPct = totalRef ? totalDiffAbs / totalRef : 0;
  const summary = `<div class="positions-summary-card"><div class="pos-grid"><div class="pos-col pos-rank"><div class="pos-rank-badge"><strong>Σ</strong></div></div><div class="pos-col"><div class="positions-summary-label">Summe</div><div class="positions-summary-sub">Aktuelle Sortierung · Gesamtdepot</div></div><div class="pos-col neutral"><div class="pos-value-top">${compactCurrency(totalCurrent)}</div><div class="pos-value-sub">${compactCurrency(totalRef)}</div></div><div class="pos-col neutral"><div class="pos-value-top">–</div><div class="pos-value-sub">–</div></div><div class="pos-col ${cl(totalDayAbs)}"><div class="pos-value-top">${fc(totalDayAbs)}</div><div class="pos-value-sub">${fp(totalDayPct)}</div></div><div class="pos-col ${cl(totalDiffAbs)}"><div class="pos-value-top">${fc(totalDiffAbs)}</div><div class="pos-value-sub">${fp(totalDiffPct)}</div></div><div class="pos-col neutral"><div class="pos-share-top">100,00%</div><div class="pos-share-sub">100,00%</div></div></div>`;
  wrap.innerHTML = header + cards + summary;
}
function group(rows,key,topN=8){
  const total = rows.reduce((s,r)=>s+r.currentValue,0);
  const map = new Map();
  rows.forEach(r=>{ const label = r.meta[key] || 'Nicht zugeordnet'; map.set(label, (map.get(label)||0)+r.currentValue); });
  let items = [...map.entries()].map(([label,value])=>({label,value,share:total?value/total:0})).sort((a,b)=>b.value-a.value);
  if(items.length>topN){ const head=items.slice(0,topN); const restValue=items.slice(topN).reduce((s,i)=>s+i.value,0); if(restValue>0) head.push({label:'Sonstige', value:restValue, share: total?restValue/total:0}); items=head; }
  return items;
}
function donutCard(title, sub, items, centerLabel, valueMode='value'){
  const total = items.reduce((s,i)=>s+i.value,0);
  let cursor = 0;
  const parts = items.map((it,idx)=>{ const start = cursor*100; cursor += it.share; const end = cursor*100; return `${groupPalette[idx % groupPalette.length]} ${start}% ${end}%`; });
  return `<div class="structure-card"><div class="structure-head"><div><div class="structure-title">${title}</div><div class="structure-sub">${sub}</div></div><div class="structure-total">${f(total)} €</div></div><div class="donut-wrap"><div class="donut" style="background:conic-gradient(${parts.join(',') || '#d8d4ce 0 100%'})"><div class="donut-center"><strong>${items.length}</strong><span>${centerLabel}</span></div></div><div class="legend">${items.map((it,idx)=>`<div class="legend-item"><span class="legend-swatch" style="background:${groupPalette[idx % groupPalette.length]}"></span><span class="legend-name">${it.label}</span><strong class="legend-val">${valueMode==='share' ? f(it.share*100,1)+'%' : f(it.value)+' €'}</strong></div>`).join('')}</div></div><div class="structure-footer">100%</div></div>`;
}
function barsCard(title, sub, items){
  return `<div class="structure-card"><div class="structure-head"><div><div class="structure-title">${title}</div><div class="structure-sub">${sub}</div></div><div class="structure-total">${items.length}</div></div><div class="bar-list">${items.map((it,idx)=>`<div class="bar-item"><div class="bar-label">${it.label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(it.share*100,3)}%;background:${barPalette[idx % barPalette.length]}"></div></div><div class="bar-value">${f(it.share*100,1)}%</div></div>`).join('')}</div><div class="structure-footer bars">100%</div></div>`;
}
function renderStructure(rows){
  const categories = group(rows,'category',8);
  const countries = group(rows,'country',8);
  document.getElementById('structureGrid').innerHTML = [
    donutCard('Kategorien','Gesamtdepot nach aktuellem Marktwert',categories,'Kategorien','share'),
    barsCard('Länder','Gewichtung nach aktuellem Marktwert',countries)
  ].join('');
}
function renderTransactions(){
  let html = `<thead><tr><th>Datum</th><th>Typ</th><th>Bezeichnung</th><th>WKN</th><th>Stück</th><th>Kurs</th><th>Betrag</th></tr></thead><tbody>`;
  portfolio.forEach(p=>p.lots.forEach(l=>{ html += `<tr><td>${l.date}</td><td class="dim">START</td><td>${p.name}</td><td class="dim">${p.wkn}</td><td>${f(l.shares,0)}</td><td>${f(l.price,2)} €</td><td>${f(l.shares*l.price)} €</td></tr>`; }));
  html += '</tbody>';
  document.getElementById('transactionsTable').innerHTML = html;
}
function toggleDetails(){ detailMode = !detailMode; render(); }
function toggleTransactions(){
  transactionsOpen = !transactionsOpen;
  document.getElementById('transactionsWrap').classList.toggle('hidden', !transactionsOpen);
  document.getElementById('transactionsNavBtn').classList.toggle('active', transactionsOpen);
}
function goHome(){
  detailMode = false;
  currentSort = { key: 'currentValue', dir: 'desc' };
  if (transactionsOpen) {
    transactionsOpen = false;
    document.getElementById('transactionsWrap').classList.add('hidden');
    document.getElementById('transactionsNavBtn').classList.remove('active');
  }
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }
async function refreshMarketData() {
  if (marketRefreshRunning) return;
  setRefreshButtonsLoading(true);
  setStatus('Aktualisiere Kurse & Wechselkurse…');
  try {
    await loadFX();
    await loadKurse();
    const loaded = Object.keys(liveKurse).length;
    const total = portfolio.length;
    const fxLoaded = Object.keys(fxRates).length;
    lastMarketUpdate = new Date();
    currentSort = { key: 'currentValue', dir: 'desc' };
    const now = formatStamp(lastMarketUpdate);
    setStatus(`Online · ${loaded}/${total} Kurse geladen · ${fxLoaded} Währungen · Stand ${now}`);
    render();
  } catch (e) {
    console.error('Refresh fehlgeschlagen', e);
    setStatus('Online-Aktualisierung fehlgeschlagen – Referenzwerte bleiben sichtbar');
    render();
  } finally {
    setRefreshButtonsLoading(false);
  }
}
function render(){ const rows=rowsFromPortfolio(); renderDate(); renderKpis(rows); renderPositions(rows); renderStructure(rows); renderTransactions(); }
render();
refreshMarketData();
</script>
